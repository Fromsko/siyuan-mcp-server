name: Go CI

on:
  push:
    branches: [main, go-mcp]
    tags: ['v*']
  pull_request:
    branches: [go-mcp]

jobs:
  # Guard: only run Go jobs when the commit/tag is reachable from go-mcp.
  # Prevents GoReleaser from running on TS release tags (on main).
  check-branch:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      on-go: ${{ steps.check.outputs.on-go }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          if git branch -r --contains ${{ github.sha }} | grep -qE 'origin/go-mcp$'; then
            echo "on-go=true" >> "$GITHUB_OUTPUT"
          else
            echo "on-go=false" >> "$GITHUB_OUTPUT"
            echo "Tag is not on go-mcp branch — skipping GoReleaser"
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - run: go vet ./...
      - run: go run ./cmd/integration_test/

  goreleaser:
    needs: check-branch
    if: needs.check-branch.outputs.on-go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
