name: Go CI

on:
  push:
    branches: [main, go-mcp]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26.4']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -v -o siyuan-mcp-server-go .

      - name: Integration Test
        run: go run ./cmd/integration_test/
