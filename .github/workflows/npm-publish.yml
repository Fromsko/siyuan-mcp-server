# This workflow will run tests using node and then publish a package to npm
# when a release tag is created ON THE main BRANCH.
# Tag pushes from other branches (e.g. go-mcp) are skipped.
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on:
  push:
    tags:
      - 'v*'

jobs:
  # Guard: only proceed when the tagged commit is reachable from main.
  # This prevents Go release tags (on the go-mcp branch) from triggering npm publish.
  check-branch:
    runs-on: ubuntu-latest
    outputs:
      on-main: ${{ steps.check.outputs.on-main }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          if git branch -r --contains ${{ github.sha }} | grep -qE 'origin/main$'; then
            echo "on-main=true" >> "$GITHUB_OUTPUT"
          else
            echo "on-main=false" >> "$GITHUB_OUTPUT"
            echo "Tag is not on main branch — skipping npm publish/release"
          fi

  build:
    needs: check-branch
    if: needs.check-branch.outputs.on-main == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm test -- --passWithNoTests
        if: always()

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.id }}
    steps:
      - uses: actions/checkout@v4
      - name: Get package version
        id: package-version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - name: Create Release
        id: create-release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            Release version ${{ github.ref_name }}
            
            ## Changelog
            See [CHANGELOG.md](./CHANGELOG.md) for details.

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # Needed for publishing to npm using OIDC
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: https://registry.npmjs.org/
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm test -- --passWithNoTests
        if: always()
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm_token }}
