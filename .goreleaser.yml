version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: siyuan-mcp-server
    main: .
    binary: siyuan-mcp-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    mod_timestamp: '{{ .CommitTimestamp }}'
    hooks:
      post:
        - cmd: upx --best --lzma "{{ .Path }}" || true
          output: true

archives:
  - formats: ['binary']
    name_template: >-
      siyuan-mcp-server-
      {{- .Os }}-
      {{- .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}
      {{- if eq .Os "windows" }}.exe{{ end }}

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
